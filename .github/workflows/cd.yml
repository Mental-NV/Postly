name: CD

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: cd-${{ github.event.workflow_run.head_branch || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  AZURE_WEBAPP_NAME: Postly
  AZURE_SQLITE_DB_PATH: /home/data/postly.db
  MIGRATION_BUNDLE_NAME: postly-efbundle
  PUBLISH_DIR: ./artifacts/publish

jobs:
  deploy:
    name: Deploy
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install dotnet-ef
        run: |
          dotnet tool install --global dotnet-ef --version 10.*
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Restore solution
        run: dotnet restore Postly.sln

      - name: Publish app
        run: dotnet publish backend/src/Postly.Api/Postly.Api.csproj --configuration Release --no-restore -o ${{ env.PUBLISH_DIR }}

      - name: Build migration bundle
        run: dotnet ef migrations bundle --project backend/src/Postly.Api/Postly.Api.csproj --startup-project backend/src/Postly.Api/Postly.Api.csproj --configuration Release --no-build --self-contained -r linux-x64 --output ${{ env.PUBLISH_DIR }}/${{ env.MIGRATION_BUNDLE_NAME }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ${{ env.PUBLISH_DIR }}

      - name: Apply database migrations
        env:
          AZURE_WEBAPP_PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          AZURE_SQLITE_DB_PATH: ${{ env.AZURE_SQLITE_DB_PATH }}
          MIGRATION_BUNDLE_PATH: /home/site/wwwroot/${{ env.MIGRATION_BUNDLE_NAME }}
        run: ./scripts/deployment/apply-azure-migrations.sh
